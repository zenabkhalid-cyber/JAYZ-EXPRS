<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحويل إلى مشترك</title>
    <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/transfer1.css">
</head>
<body>

<div class="app-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <a href="transfer4.html" class="text-white"><i class="bi bi-chevron-right"></i></a>
        <h5 class="m-0 fw-bold">طلب استلام حوالة دولية</h5>
        <div style="width: 24px;"></div>
    </div>

    <div class="text-center mb-4">
        <div class="icon-box">
           <i class="bi bi-cash-stack"></i>
        </div>
    </div>

    <label class="input-label">خدمة التحويل </label>
    <div class="d-flex custom-group mb-4">
        <button class="btn p-0 px-2 shadow-none" id="eyeBtn">
           
        </button>
        <select class="form-select" id="currencySelector">
            <option data-label="تضامن باي">تضامن باي</option>
            <option data-label="موني جرام" >موني جرام</option>
            <option data-label="خدمة دولية اخرى" >خدمة دولية اخرى</option>
          
        </select></div>
    


   
    <div class="custom-group mb-3 p-1">
        <input type="number" id="amountField" class="form-control" placeholder="رقم الحوالة">
    </div>
     <div class="custom-group mb-3 p-1">
        <input type="number" id="amountField" class="form-control" placeholder="ملاحظات">
    </div>
   

    <button id="payBtn" class="btn-submit">استمرار</button>


<div id="successLayer" class="success-overlay" style="display: none;">
    <div class="check-circle"><i class="fas fa-check"></i></div>
    <h3 class="fw-bold text-white">نجحت العملية</h3>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // تعريف العناصر بشكل صحيح
        const eyeBtn = document.getElementById('eyeBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        const currencySelector = document.getElementById('currencySelector');
        const favBtn = document.getElementById('favBtn');
        const favMenu = document.getElementById('favMenu');
        const payBtn = document.getElementById('payBtn');
        const successLayer = document.getElementById('successLayer');
        const amountField = document.getElementById('amountField');

        let isHidden = true;

        // 1. منطق العين (إظهار/إخفاء الرصيد) - تم تصحيح علامات التنصيص 
        if (eyeBtn && currencySelector) {
            eyeBtn.addEventListener('click', () => {
                isHidden = !isHidden;
                const options = currencySelector.options;
                
                for (let i = 0; i < options.length; i++) {
                    const label = options[i].getAttribute('data-label');
                    const val = options[i].getAttribute('data-val');
                    
                    // استخدام الـ Backticks  بدلاً من علامات التنصيص العادية لتفعيل ميزة المتغيرات
                   options[i].text = isHidden ? `${label} | * `:` ${label} | ${val}`;
                }
                
                eyeIcon.className = isHidden ? 'far fa-eye-slash text-danger' : 'far fa-eye text-danger';
            });
        }

        // 2. منطق المفضلة
        if (favBtn) {
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                favMenu.style.display = (favMenu.style.display === 'block') ? 'none' : 'block';
            });
        }

        document.addEventListener('click', () => {
            if (favMenu) favMenu.style.display = 'none';
        });

        // 3. تنفيذ العملية (زر استمرار)
        if (payBtn) {
            payBtn.addEventListener('click', function () {
                if (!amountField.value || amountField.value <= 0) {
                    alert("يرجى إدخال رقم الحواله  صحيح");
                    return;
                }

                this.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري المعالجة...';
                this.disabled = true;

                setTimeout(() => {
                    if (successLayer) successLayer.style.display = 'flex';
                    setTimeout(() => {
                        if (successLayer) successLayer.style.display = 'none';
                        this.innerHTML = 'استمرار';
                        this.disabled = false;
                        amountField.value = "";
                    }, 3000);
                }, 1500);
            });
        }
    });

    // دالة تعبئة الرقم من المفضلة
    function fillPhone(num) {
        const phoneInput = document.getElementById('phoneInput');
        if (phoneInput) phoneInput.value = num;
    }
</script>

</body>
</html>
