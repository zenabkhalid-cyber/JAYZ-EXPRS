      <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="الإشعارات - محفظة جيب">
    <title>الإشعارات - محفظة جيب</title>
    <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/index.css">
    
</head>
<body class="bg-black">

<div class="container-fluid p-3 animate-fade-up" style="padding-bottom: 120px;">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3 pt-2">
        <a href="paragram5.html" class="glass-card p-2 rounded-circle text-white d-flex align-items-center justify-content-center" style="width:42px;height:42px;padding:0 !important;" title="رجوع">
            <i class="bi bi-chevron-right"></i>
        </a>
        <h5 class="fw-bold m-0" style="letter-spacing:-0.3px;">الإشعارات</h5>
        <button id="markAllBtn" class="mark-all-btn">قراءة الكل</button>
    </div>

    <!-- Filter Tabs -->
    <div class="notif-tabs">
        <button class="notif-tab active" data-filter="all">الكل <span class="notif-count-badge" id="allCount">0</span></button>
        <button class="notif-tab" data-filter="unread">غير مقروء <span class="notif-count-badge" id="unreadCount">0</span></button>
        <button class="notif-tab" data-filter="info">ℹ️ معلومات</button>
        <button class="notif-tab" data-filter="success">✅ نجاح</button>
        <button class="notif-tab" data-filter="warning">⚠️ تنبيه</button>
        <button class="notif-tab" data-filter="promo">🎁 عروض</button>
    </div>

    <!-- Notification List -->
    <div id="notifContainer"></div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav-modern glass-nav">
    <a href="paragram5.html" class="nav-item-modern">
        <i class="bi bi-house-door-fill fs-4 mb-1"></i><span>الرئيسية</span>
    </a>
    <a href="services.html" class="nav-item-modern">
        <i class="bi bi-grid-fill fs-4 mb-1"></i><span>الخدمات</span>
    </a>
    <div style="width: 70px;"></div>
    <a href="history.html" class="nav-item-modern">
        <i class="bi bi-clock-history fs-4 mb-1"></i><span>العمليات</span>
    </a>
    <a href="profile.html" class="nav-item-modern">
        <i class="bi bi-person-fill fs-4 mb-1"></i><span>الملف</span>
    </a>
</nav>
<a href="scan.html" class="fab-qr" title="QR"><i class="bi bi-qr-code-scan"></i></a>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('notifContainer');
    const markAllBtn = document.getElementById('markAllBtn');
    let currentFilter = 'all';

    function getNotifications() {
        return JSON.parse(localStorage.getItem('wallet_notifications') || '[]');
    }
    function saveNotifications(notifs) {
        localStorage.setItem('wallet_notifications', JSON.stringify(notifs));
    }

    const typeConfig = {
        info:    { icon: 'bi-info-circle-fill', color: 'text-info',    bg: 'rgba(0,210,255,0.08)', iconBg: 'rgba(0,210,255,0.12)' },
        success: { icon: 'bi-check-circle-fill', color: 'text-success', bg: 'rgba(56,239,125,0.08)', iconBg: 'rgba(56,239,125,0.12)' },
        warning: { icon: 'bi-exclamation-triangle-fill', color: 'text-warning', bg: 'rgba(255,193,7,0.08)', iconBg: 'rgba(255,193,7,0.12)' },
        promo:   { icon: 'bi-gift-fill', color: 'text-danger',  bg: 'rgba(255,61,68,0.08)', iconBg: 'rgba(255,61,68,0.12)' }
    };

    function updateCounts() {
        const notifs = getNotifications();
        document.getElementById('allCount').textContent = notifs.length;
        document.getElementById('unreadCount').textContent = notifs.filter(n => !n.read).length;
    }

    function render() {
        const notifs = getNotifications();
        updateCounts();

        let filtered = notifs;
        if (currentFilter === 'unread') {
            filtered = notifs.filter(n => !n.read);
        } else if (currentFilter !== 'all') {
            filtered = notifs.filter(n => n.type === currentFilter);
        }

        if (filtered.length === 0) {
            const emptyMsg = currentFilter === 'all' ? 'لا توجد إشعارات حالياً' : 'لا توجد إشعارات من هذا النوع';
            container.innerHTML = '<div class="text-center py-5" style="padding-top:60px !important;">' +
                '<div style="width:80px;height:80px;border-radius:24px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">' +
                '<i class="bi bi-bell-slash" style="font-size:2rem;opacity:0.2;"></i></div>' +
                '<p class="text-muted fw-medium" style="font-size:0.9rem;">' + emptyMsg + '</p>' +
                '<a href="paragram5.html" class="btn btn-sm text-decoration-none" style="background:var(--primary-gradient);color:white;border-radius:12px;padding:8px 24px;font-size:0.82rem;font-weight:600;">العودة للرئيسية</a></div>';
            return;
        }

        var html = '';
        var reversed = filtered.slice().reverse();
        for (var i = 0; i < reversed.length; i++) {
            var n = reversed[i];
            var realIdx = notifs.indexOf(n);
            var cfg = typeConfig[n.type] || typeConfig.info;
            var timeAgo = getTimeAgo(new Date(n.date));
            var bgStyle = n.read ? 'var(--glass-bg)' : cfg.bg;
            var unreadClass = n.read ? '' : 'unread';
            var dotHTML = n.read ? '' : '<div class="notif-dot"></div>';

            html += '<div class="glass-card border-0 mb-3 p-3 notif-item ' + unreadClass + '" data-idx="' + realIdx + '" onclick="markRead(' + realIdx + ')" style="background:' + bgStyle + ';">' +
                '<div class="d-flex align-items-start gap-3">' +
                '<div class="notif-icon-wrapper" style="background:' + cfg.iconBg + ';">' +
                '<i class="bi ' + cfg.icon + ' ' + cfg.color + '" style="font-size:1.1rem;"></i></div>' +
                '<div class="flex-grow-1">' +
                '<div class="d-flex justify-content-between align-items-center mb-1">' +
                '<span class="fw-bold" style="font-size:0.85rem;">' + n.title + '</span>' +
                '<div class="d-flex align-items-center gap-2">' + dotHTML +
                '<button class="delete-notif-btn" onclick="event.stopPropagation(); deleteNotif(' + realIdx + ')" title="حذف"><i class="bi bi-trash3"></i></button>' +
                '</div></div>' +
                '<p class="text-muted mb-1" style="font-size:0.8rem;line-height:1.5;">' + n.body + '</p>' +
                '<small class="text-muted" style="font-size:0.68rem;">' + timeAgo + '</small>' +
                '</div></div></div>';
        }
        container.innerHTML = html;
    }

    window.markRead = function(idx) {
        var notifs = getNotifications();
        if (notifs[idx]) {
            notifs[idx].read = true;
            saveNotifications(notifs);
            render();
        }
    };

    window.deleteNotif = function(idx) {
        var notifs = getNotifications();
        if (notifs[idx]) {
            notifs.splice(idx, 1);
            saveNotifications(notifs);
            render();
        }
    };

    markAllBtn.addEventListener('click', function() {
        var notifs = getNotifications();
        notifs.forEach(function(n) { n.read = true; });
        saveNotifications(notifs);
        render();
    });

    // Filter tabs
    document.querySelectorAll('.notif-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.notif-tab').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            render();
        });
    });

    function getTimeAgo(date) {
        var diff = Math.floor((new Date() - date) / 1000);
        if (diff < 60) return 'الآن';
        if (diff < 3600) return 'منذ ' + Math.floor(diff/60) + ' دقيقة';
        if (diff < 86400) return 'منذ ' + Math.floor(diff/3600) + ' ساعة';
        if (diff < 604800) return 'منذ ' + Math.floor(diff/86400) + ' يوم';
        return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    render();
});
</script>
</body>
</html>
