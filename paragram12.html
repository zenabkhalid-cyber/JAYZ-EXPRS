<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدفوعات</title>
    <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/paragram7.css">
</head>
<body>

<div class="container-fluid">
    <div class="header-title d-flex justify-content-between align-items-center mb-4">
       
             <a href="paragram5.html" class="text-white"><i class="bi bi-chevron-right"></i></a>
        <h5 class="m-0">المدفوعات </h5>
         <div class="refresh-btn" id="refreshBtn">
            تحديث <i class="bi bi-arrow-clockwise ms-1"></i>
        </div>
    </div>

    <div class="list-container">
        <a href="#" class="transfer-card">
            <span class="card-text">تبرعات</span>
            <div class="icon-box">
                <i class="bi bi-heart-fill text-danger" style="font-size: 1.4rem;"></i>
                <div class="small-hands-icon"></div> </div>
        </a>

        <a href="#" class="transfer-card">
            <span class="card-text">سداد رسوم حكومية MPS</span>
            <div class="icon-box">
                <img src="https://via.placeholder.com/40x20/000000/FFFFFF?text=MPS" alt="MPS" class="img-fluid rounded">
            </div>
        </a>

        <a href="#" class="transfer-card">
            <span class="card-text">سداد رسوم حكومية E-Sadad</span>
            <div class="icon-box">
                <i class="bi bi-cpu-fill text-info" style="font-size: 1.5rem;"></i>
            </div>
        </a>

        <a href="#" class="transfer-card">
            <span class="card-text">مدفوعات الزكاة</span>
            <div class="icon-box bg-dark">
                <img src="https://via.placeholder.com/40?text=Zakat" alt="Zakat" class="img-fluid">
            </div>
        </a>
    </div>
</div>

<div class="modal fade" id="locationModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-body text-center p-4">
        <i class="bi bi-geo-alt-fill text-danger mb-3" style="font-size: 3rem;"></i>
        <h5 class="mb-3">السماح بالوصول للموقع؟</h5>
        <p class="text-secondary small">نحتاج للوصول إلى موقعك الجغرافي لنتمكن من عرض أقرب أجهزة صراف آلي إليك بدقة.</p>
        <div class="d-grid gap-2">
            <button type="button" class="btn btn-danger py-2 fw-bold" id="confirmLocation">موافق، ابحث الآن</button>
            <button type="button" class="btn btn-link text-secondary text-decoration-none" data-bs-dismiss="modal">ليس الآن</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
