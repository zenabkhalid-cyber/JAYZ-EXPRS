<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة تحويل</title>
    
    <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/paragram7.css">
</head>
 <body>

<div class="container-fluid">
    <div class="header-title">
        <a href="paragram5.html" style="color: white;"><i class="bi bi-chevron-right"></i></a>
        <h5 class="m-0">شبكة تحويل</h5>
        <div style="width: 20px;"></div>
    </div>

    <div class="text-center mb-4">
        <div class="main-logo-box">
             <span class="logo-text">تحويل</span>
        </div>
    </div>

    <a href="send_transfer.html" class="transfer-card">
        <span class="card-text">إرسال حوالة شبكة تحويل</span>
        <div class="icon-box">
            <i class="bi bi-send-plus"></i>
            <i class="bi bi-arrow-up-right red-arrow"></i>
        </div>
    </a>

    <a href="receive_transfer.html" class="transfer-card">
        <span class="card-text">استلام حوالة</span>
        <div class="icon-box">
            <i class="bi bi-box-arrow-in-down"></i>
            <i class="bi bi-dash-lg red-arrow"></i>
        </div>
    </a>

    <a href="status_transfer.html" class="transfer-card">
        <span class="card-text">حالة حوالة</span>
        <div class="icon-box">
            <i class="bi bi-info-circle"></i>
            <i class="bi bi-arrow-clockwise red-arrow"></i>
        </div>
    </a>

    <a href="cancel_transfer.html" class="transfer-card">
        <span class="card-text">إلغاء حوالة</span>
        <div class="icon-box">
            <i class="bi bi-x-square"></i>
            <i class="bi bi-x red-arrow"></i>
        </div>
    </a>
</div>

</body>
</html>
