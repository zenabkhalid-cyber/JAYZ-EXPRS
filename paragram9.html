<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شراء أونلاين</title>
    <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/paragram7.css">
</head>
<body>

<div class="container-fluid">
    <div class="header-title">
        <a href="paragram5.html" style="color: white; text-decoration: none;"><i class="bi bi-chevron-right"></i></a>
        <h5 class="m-0">شراء أونلاين</h5>
        <div style="width: 20px;"></div>
    </div>

    <a href="purchase_code.html" class="transfer-card">
        <span class="card-text">كود شراء</span>
        <div class="icon-box">
            <i class="bi bi-basket-fill"></i>
            <i class="bi bi-three-dots red-arrow" style="bottom: 5px;"></i>
        </div>
    </a>

    <a href="e_cards.html" class="transfer-card">
        <span class="card-text">البطائق الإلكترونية</span>
        <div class="icon-box">
            <i class="bi bi-card-checklist"></i>
            <i class="bi bi-credit-card-2-back-fill red-arrow"></i>
        </div>
    </a>
</div>
<script>
    // التأكد من وجود عنصر يحمل المعرف refreshBtn قبل تنفيذ الكود
    const refreshBtn = document.getElementById('refreshBtn');
    if (refreshBtn) {
        refreshBtn.addEventListener('click', function() {
            // تأثير دوران الأيقونة عند الضغط
            const icon = this.querySelector('i');
            icon.style.transition = "transform 0.5s ease";
            icon.style.transform = "rotate(360deg)";
            
            // إعادة تحميل الصفحة بعد 300 مللي ثانية (لإعطاء وقت لتأثير الدوران)
            setTimeout(() => {
                location.reload();
            }, 300);
        });
    }
</script>

</body>
</html>
