<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحويل بين حساباتي (مصارفة)</title>
    <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/transfer1.css">
</head>
<body>
    <div class="app-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
         <a href="paragram6.html" class="text-white"><i class="bi bi-chevron-right"></i></a>
        <h5 class="m-0 fw-bold">تحويل بين حساباتي (مصارفة)</h5>
        <div style="width: 24px;"></div>
    </div>

    <div class="text-center mb-4">
        <div class="icon-box-circle">
            <i class="bi bi-arrow-repeat"></i>
        </div>
    </div>

    <div class="account-section mb-3">
        <label class="input-label">من حساب</label>
        <div class="d-flex custom-group">
            <button class="btn p-0 px-2 shadow-none" onclick="toggleBalance('from')">
                <i class="far fa-eye-slash text-danger" id="eyeIconFrom"></i>
            </button>
            <select class="form-select" id="currencyFrom">
                <option data-label="ريال يمني" data-val="240,500">ريال يمني | *</option>
                <option data-label="ريال سعودي" data-val="2,500">ريال سعودي | *</option>
            </select>
        </div>
    </div>

    <div class="custom-group mb-3 p-1">
        <input type="number" class="form-control" placeholder="المبلغ">
    </div>

    <div class="account-section mb-4">
        <label class="input-label">إلى حساب</label>
        <div class="d-flex custom-group">
            <button class="btn p-0 px-2 shadow-none" onclick="toggleBalance('to')">
                <i class="far fa-eye-slash text-danger" id="eyeIconTo"></i>
            </button>
            <select class="form-select" id="currencyTo">
                <option data-label="ريال سعودي" data-val="2,500">ريال سعودي | *</option>
                <option data-label="دولار امريكي" data-val="400">دولار امريكي | *</option>
            </select>
        </div>
    </div>

    <div class="custom-group mb-4 p-1">
        <input type="text" class="form-control" placeholder="ملاحظات">
    </div>

    <button id="payBtn" class="btn-submit">استمرار</button>
    <div id="successLayer" class="success-overlay" style="display: none;">
    <div class="check-circle"><i class="fas fa-check"></i></div>
    <h3 class="fw-bold text-white">نجحت العملية</h3>
</div>
    <script>
  document.addEventListener('DOMContentLoaded', function () {
    const payBtn = document.getElementById('payBtn');
    const successLayer = document.getElementById('successLayer');
    const amountInput = document.querySelector('input[type="number"]');

    if (payBtn) {
        payBtn.addEventListener('click', function () {
            if (!amountInput.value || amountInput.value <= 0) {
                alert("يرجى إدخال المبلغ المراد تحويله");
                return;
            }

            this.innerHTML = '<span class="spinner-border spinner-border-sm"></span> جاري المعالجة...';
            this.disabled = true;

            setTimeout(() => {
                if (successLayer) {
                    successLayer.style.display = 'flex';
                    
                    setTimeout(() => {
                        successLayer.style.display = 'none';
                        this.innerHTML = 'استمرار';
                        this.disabled = false;
                        amountInput.value = "";
                    }, 3000);
                }
            }, 1500);
        });
    }
});
let isHiddenFrom = true;
let isHiddenTo = true;

function toggleBalance(target) {
    const selectorId = target === 'from' ? 'currencyFrom' : 'currencyTo';
    const iconId = target === 'from' ? 'eyeIconFrom' : 'eyeIconTo';
    let hiddenState = target === 'from' ? isHiddenFrom : isHiddenTo;

    hiddenState = !hiddenState;
    
    if(target === 'from') isHiddenFrom = hiddenState;
    else isHiddenTo = hiddenState;

    document.getElementById(iconId).className = hiddenState ? 'far fa-eye-slash text-danger' : 'far fa-eye text-danger';

    const options = document.getElementById(selectorId).options;
    for (let i = 0; i < options.length; i++) {
        const label = options[i].getAttribute('data-label');
        const val = options[i].getAttribute('data-val');
        options[i].text = hiddenState ? `${label} | ***** `:` ${label} | ${val}`;
    }
}
</script>
</div>
</body>
</html>
