<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حوالات شبكات محلية</title>
    <link href="css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/paragram6.css">
</head>
<body>

<div class="container-fluid">
    <div class="header-title">
        <a href="paragram6.html"><i class="bi bi-chevron-right"></i></a>
        <h5 class="m-0">حوالات شبكات محلية</h5>
        <div style="width: 20px;"></div>
    </div>

    <a href="#" class="transfer-card">
        <span class="card-text">إرسال حوالة عبر شبكات محلية</span>
        <div class="icon-box">
            <i class="bi bi-send-plus"></i>
            <i class="bi bi-arrow-up-right red-arrow"></i>
        </div>
    </a>

    <a href="#" class="transfer-card">
        <span class="card-text">استلام حوالة عبر شبكات محلية</span>
        <div class="icon-box">
            <i class="bi bi-box-arrow-in-down"></i>
            <i class="bi bi-arrow-down-left red-arrow"></i>
        </div>
    </a>

    <a href="#" class="transfer-card">
        <span class="card-text">حالة حوالة شبكة محلية</span>
        <div class="icon-box">
            <i class="bi bi-info-circle"></i>
            <i class="bi bi-arrow-clockwise red-arrow"></i>
        </div>
    </a>

    <a href="#" class="transfer-card">
        <span class="card-text">إلغاء حوالة شبكة محلية</span>
        <div class="icon-box">
            <i class="bi bi-x-square"></i>
            <i class="bi bi-x red-arrow"></i>
        </div>
    </a>
</div>

</body>
</html>
